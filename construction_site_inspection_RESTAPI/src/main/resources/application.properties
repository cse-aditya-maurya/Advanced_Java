spring.application.name=construction_site.inspection.RESTAPI



# ==================================================
# DATABASE CONFIGURATION (MySQL)
# ==================================================
spring.datasource.url=jdbc:mysql://localhost:3306/construction_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Adi@2552
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ==================================================
# JPA / HIBERNATE CONFIGURATION
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ? Do NOT manually set dialect for Hibernate 6/7
# Spring Boot auto-detects it


# ==================================================
# FILE UPLOAD CONFIGURATION
# ==================================================
# Base upload directory
file.upload-dir=uploads/inspections

# Maximum file size (Business Rule: 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# ==================================================
# LOGGING
# ==================================================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ==================================================
# ERROR HANDLING
# ==================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# ==================================================
# JSON CONFIGURATION
# ==================================================
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null